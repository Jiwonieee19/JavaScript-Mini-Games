<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <p class="over" id="hide">GAME OVER</p>
    <p class="score">TOTAL SCORE: 0</p>
    <div class="food"></div>
    <li class="list">
        <div class="head"></div>
        <div class="body" id="no1"></div>
        <div class="body" id="no2"></div>
        <div class="body" id="no3"></div>
    </li>
    <!-- <canvas id="game" width="400" height="400"></canvas> -->
</body>
    <script>
        const list = document.querySelector(".list")
        const head = document.querySelector(".head")
        let one = document.getElementById("no1")
        let velocity = 0
        let current = 0
        let currentSub = 0
        let subcoordinates = ""
        let bodyCount = document.querySelectorAll(".body")
        let prevMove = "up" // stopper for overlap body move
        let xy = "" // pang continue if idle
        let moving = false
        let gameLoop = ""
        const food = document.querySelector(".food")
        let score = 0
        let bodyCountSeparate = 3

        console.log(bodyCount.length)

        setInterval(
            document.addEventListener("keydown", (event) => {
            if (event.key === "ArrowUp" && prevMove !== "down") {
                velocity = 20
                prevMove = "up"
                // move(velocity, "x")
                xy = "x"
                if (!moving) startGame()
            } else if (event.key === "ArrowDown" && prevMove !== "up") {
                velocity = -20
                prevMove = "down"
                // move(velocity, "x")
                xy = "x"
                if (!moving) startGame()
            } else if (event.key === "ArrowLeft" && prevMove !== "right") {
                velocity = 20
                prevMove = "left"
                // move(velocity, "y")
                xy = "y"
                if (!moving) startGame()
            } else if (event.key === "ArrowRight" && prevMove !== "left") {
                velocity = -20
                prevMove = "right"
                // move(velocity, "y")
                xy = "y"
                if (!moving) startGame()
            }
        }), 200
        );

        function startGame() {
            moving = true
            gameLoop = setInterval(() => {
                move(velocity,xy)
                gameOverChecker()
                foodFunction()
                console.log("Parse: " + parseInt(getComputedStyle(head).top) + " CurrentHeight: " + window.innerHeight)
            }, 200)
        };

        function gameOverChecker() {
            // if touches the border of x and y, dynamically since we have innerXY function
            if (xy === "x" && 
                (parseInt(getComputedStyle(head).top) > window.innerHeight 
                || parseInt(getComputedStyle(head).top) < 0)) {
                    console.log("GAME OVER")
                    clearInterval(gameLoop) // ends the interval
                    document.getElementById("hide").style.display = "flex"
                } else if (xy === "y" && 
                (parseInt(getComputedStyle(head).left) > window.innerWidth
                || parseInt(getComputedStyle(head).left) < 0)) {
                    console.log("GAME OVER")
                    clearInterval(gameLoop) // ends the interval
                    document.getElementById("hide").style.display = "flex"
                }
                // if touches the body itself
                else if (headTouchesBody()) {
                    console.log("GAME OVER")
                    clearInterval(gameLoop) // ends the interval
                    document.getElementById("hide").style.display = "flex"
                }
        };

        function headTouchesBody() {
            for (let j = 1; j < (bodyCountSeparate + 1); j++) {
                console.log("BODY COUNT: " + bodyCountSeparate)
                let bodyHere = document.getElementById("no" + j)
                if (getComputedStyle(head).top < (getComputedStyle(bodyHere).top + getComputedStyle(bodyHere).height) &&
                (getComputedStyle(head).top + getComputedStyle(head).height) > getComputedStyle(bodyHere).top &&
                getComputedStyle(head).left < (getComputedStyle(bodyHere).left + getComputedStyle(bodyHere).width) &&
                (getComputedStyle(head).left + getComputedStyle(head).width) > getComputedStyle(bodyHere).left) {
                    return true
                }
            }
            return false
        }

        function foodFunction() {
            if (foodCollision()) {
                score += 10
                document.querySelector(".score").textContent = "TOTAL SCORE: " + score
                addBody()
                rePositionFood()
            }
        }

        function foodCollision() {
            const headStyle = getComputedStyle(head)
            const foodStyle = getComputedStyle(food)
            const headTop = parseInt(headStyle.top)
            const headLeft = parseInt(headStyle.left)
            const headBottom = headTop + parseInt(headStyle.height)
            const headRight = headLeft + parseInt(headStyle.width)
            const foodTop = parseInt(foodStyle.top)
            const foodLeft = parseInt(foodStyle.left)
            const foodBottom = foodTop + parseInt(foodStyle.height)
            const foodRight = foodLeft + parseInt(foodStyle.width)

            return headBottom > foodTop && headTop < foodBottom && headRight > foodLeft && headLeft < foodRight
            // if (headBottom > foodTop && headTop < foodBottom && headRight > foodLeft && headLeft < foodRight) {
            //     console.log("YAWAAAAAA")
            //     clearInterval(gameLoop)
            // }
        }

        function addBody() {
            const newDiv = document.createElement("div")
            newDiv.className = "body"
            newDiv.id = "no" + (bodyCountSeparate + 1)
            newDiv.style.top = one.style.top // the reason is that before maka move, dria sa siya magtago
            newDiv.style.left = one.style.left
            bodyCountSeparate++
            list.appendChild(newDiv)
            bodyCount = document.querySelectorAll(".body") // brayta nako uy
        }

        function rePositionFood() {
            const newTop = MinMax(0, window.innerHeight)
            const newLeft = MinMax(0, window.innerWidth)
            console.log("New Coordinates: " + newTop + " " + newLeft)
            food.style.top = newTop + "px"
            food.style.left = newLeft + "px"
        }

        const MinMax = (min, max) => {
            return Math.ceil(Math.random() * (max - min + 1) + min)
        }

        const move = (velocity, coordinates) => {
            // coordinates === "x" ? coordinates = "top" : coordinates = "left"
            if (coordinates === "x") {
                coordinates = "top"
                subcoordinates = "left"
            } else {
                coordinates = "left"
                subcoordinates = "top"
            }
            console.log(coordinates)
            current = parseInt(getComputedStyle(head)[coordinates])
            currentSub = parseInt(getComputedStyle(head)[subcoordinates]) // ma change na sa value dria ang sub nga x/y
            // let current = parseInt(hed.style.top) || 0 // returns inline "top=100px"
            bodyFirst(current, coordinates, currentSub)
            // WHY MINUS? X AND Y WORKS DIFFERENT HERE, SINCE IN JAVASWING, WE HAVE VELOCITY/POSITION,
            // HERE ONLY MARGIN THINGS, SO THE TOP AND LEFT STARTED IN 0, NEGATIVE OVERPASS THE SCREEN
            head.style[coordinates] = (current - velocity) + "px";
            console.log(current)
            console.log(velocity)
            console.log(current - velocity)
        };

        const bodyFirst = (currrent, coordinates, currentSub) => {

            for (let i = bodyCount.length; i > 1; i--) {
                let nextBody = document.getElementById("no"+i)
                let behindBody = document.getElementById("no"+(i-1))
                nextBody.style.top = getComputedStyle(behindBody).top
                nextBody.style.left = getComputedStyle(behindBody).left
            }

            // forloop ang body then update it first before mo move si head
            console.log("naas body " + current + " and coor: " + coordinates)
            if (one === document.getElementById("no1")) {
                one.style[coordinates] = current + "px"
                one.style[subcoordinates] = currentSub + "px"
                // TODO: Actually need dyud daay si x and y, since if left, 
                // kuhaon niya ang left ni head which is same ra saiya so mura siyag wla nilihok
                // clever, my og approach is one.style.coordinates plus no "" in line 43
            }

        }
    </script>
    
    <!-- <script src="index.js"></script> -->
</html>

<!-- The key event isn't working because keydown on a <div> only fires if the element is focusable. A plain <div> (head) cannot receive focus, so the event never triggers.
Two problems:
1. No tabindex — the <div class="head"> needs tabindex="0" to be focusable.
2. No initial focus — even if tabindex is added, you need head.focus() to give it focus.
Either add tabindex="0" + head.focus(), or better — move the listener to document so it catches keyboard input universally:
document.addEventListener('keydown', (event) => { ... }) -->

<!-- Summary: .style = only the style="" attribute on the element itself. It's for setting (and reading what you've set inline). 
getComputedStyle = the final rendered value after all CSS sources are merged. -->
