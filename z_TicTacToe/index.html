<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacToe</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>NOT CONFIDENT PA SA JS SO LETS MAKE THIS IN HTML-CSS ONLY</h1>
    <div class="table" id="table">
        <div class="row">
            <div class="column" id="r1c1" data-index="0"></div>
            <div class="column" id="r1c2" data-index="1"></div>
            <div class="column" id="r1c3" data-index="2"></div>
        </div>
        <div class="row">
            <div class="column" id="r2c1" data-index="3"></div>
            <div class="column" id="r2c2" data-index="4"></div>
            <div class="column" id="r2c3" data-index="5"></div>
        </div>
        <div class="row">
            <div class="column" id="r3c1" data-index="6"></div>
            <div class="column" id="r3c2" data-index="7"></div>
            <div class="column" id="r3c3" data-index="8"></div>
        </div>
    </div>
    <p>bobo wla daay logic sa html-css pang handle ug function so mag js nata</p>
    <div id="winner">
        WINNER COLOR
        <p style="color: black">Press Ctrl + R to restart the game</p>
    </div>
</body>

<!-- <script src="index.js"></script> // for learning only diff approach, professional-->
 <script>
    const boxes = document.querySelectorAll(".column")
    let color = ""
    let changer = 0

        boxes.forEach( box => {
        box.addEventListener("click", function() {
                if (box.style.backgroundColor === comparison.style.backgroundColor) { 
                // this if, make the click wont work if its already played/not white/default
                color = changer === 0 ? "blue" : "red"
                changer = 1 - changer //flips 1 and 0
                box.style.backgroundColor = color
                }
                checkWinner()
            })
        })

        const winner = document.querySelector("#winner")
    const comparison = document.querySelector("#table")

    const r1c1 = document.querySelector("#r1c1")
    const r1c2 = document.querySelector("#r1c2")
    const r1c3 = document.querySelector("#r1c3")

    const r2c1 = document.querySelector("#r2c1")
    const r2c2 = document.querySelector("#r2c2")
    const r2c3 = document.querySelector("#r2c3")

    const r3c1 = document.querySelector("#r3c1")
    const r3c2 = document.querySelector("#r3c2")
    const r3c3 = document.querySelector("#r3c3")

    function checkWinner() {
        // ROWS
        // console.log(r1c1) // actually ang div tag<> iya e print with this id
        if (r1c1.style.backgroundColor === r1c2.style.backgroundColor
        && r1c1.style.backgroundColor === r1c3.style.backgroundColor
        && r1c1.style.backgroundColor !== comparison.style.backgroundColor) {
            console.log(`winner: ${r1c1.style.backgroundColor}`)
            winner.style.color = r1c1.style.backgroundColor

        }
        if (r2c1.style.backgroundColor === r2c2.style.backgroundColor
        && r2c1.style.backgroundColor === r2c3.style.backgroundColor
        && r2c1.style.backgroundColor !== comparison.style.backgroundColor) {
            console.log(`winner: ${r2c1.style.backgroundColor}`)
            winner.style.color = r2c1.style.backgroundColor
        }
        if (r3c1.style.backgroundColor === r3c2.style.backgroundColor
        && r3c1.style.backgroundColor === r3c3.style.backgroundColor
        && r3c1.style.backgroundColor !== comparison.style.backgroundColor) {
            console.log(`winner: ${r3c1.style.backgroundColor}`)
            winner.style.color = r3c1.style.backgroundColor
        }

        // COLUMNS
        if (r1c1.style.backgroundColor === r2c1.style.backgroundColor
        && r1c1.style.backgroundColor === r3c1.style.backgroundColor
        && r1c1.style.backgroundColor !== comparison.style.backgroundColor) {
            console.log(`winner: ${r3c1.style.backgroundColor}`)
            winner.style.color = r1c1.style.backgroundColor
        }
        if (r1c2.style.backgroundColor === r2c2.style.backgroundColor
        && r1c2.style.backgroundColor === r3c2.style.backgroundColor
        && r1c2.style.backgroundColor !== comparison.style.backgroundColor) {
            console.log(`winner: ${r3c2.style.backgroundColor}`)
            winner.style.color = r1c2.style.backgroundColor
        }
        if (r1c3.style.backgroundColor === r2c3.style.backgroundColor
        && r1c3.style.backgroundColor === r3c3.style.backgroundColor
        && r1c3.style.backgroundColor !== comparison.style.backgroundColor) {
            console.log(`winner: ${r3c3.style.backgroundColor}`)
            winner.style.color = r1c3.style.backgroundColor
        }

        // CROSS
        if (r1c1.style.backgroundColor === r2c2.style.backgroundColor
        && r1c1.style.backgroundColor === r3c3.style.backgroundColor
        && r3c3.style.backgroundColor !== comparison.style.backgroundColor) {
            console.log(`winner: ${r1c1.style.backgroundColor}`)
            winner.style.color = r1c1.style.backgroundColor
        }
        if (r1c3.style.backgroundColor === r2c2.style.backgroundColor
        && r1c3.style.backgroundColor === r3c1.style.backgroundColor
        && r1c3.style.backgroundColor !== comparison.style.backgroundColor) {
            console.log(`winner: ${r1c3.style.backgroundColor}`)
            winner.style.color = r1c3.style.backgroundColor
        }

        // balcked the remaining white box so it will no longer be clickable
        if (winner.style.color !== comparison.style.backgroundColor) {
            boxes.forEach(box => {
                if (box.style.backgroundColor === comparison.style.backgroundColor) {
                    box.style.backgroundColor = "black"
                }
            })
        }
    }
 </script>
