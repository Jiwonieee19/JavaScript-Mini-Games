<body>
    <h1>NOT CONFIDENT PA SA JS SO LETS MAKE THIS IN HTML-CSS ONLY</h1>
    <div class="table">
        <div class="row">
            <div class="column" id="r1c1"></div>
            <div class="column" id="r1c2"></div>
            <div class="column" id="r1c3"></div>
        </div>
        <div class="row">
            <div class="column" id="r2c1"></div>

        </div>
        <div class="row">
            <div class="column" id="r3c1"></div>
            <div class="column" id= "r3c2"></div>
            <div class="column" id="r3c3"></div>
        </div>
    </div>
    <p>bobo wla daay logic sa html-css pang handle ug function so mag js nata</p>
</body>

<script>
    const boxes = document.querySelectorAll(".column")
    let available = 9;

    boxes.forEach( function(box) {
        box.addEventListener("click", function() {
            box.style.backgroundColor = "red";
            available = available - 1;
            // so dli kada frame magload gni, pag page reload lang
            // gihimo sd natog timer() gaina
            if (available === 0) {
                console.log("letsee")
                checkWinner();
            }
        })
    })

    const checkWinner = () => {
        console.log("hatdog")
    }
    
            
</script>

</html>
